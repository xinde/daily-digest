<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>熊哥每日资讯</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b983;
      --theme-bg: #fafafa;
      --heading-font-weight: 600;
    }
    .sidebar-nav > ul > li > a {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    .markdown-body {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .page_toc {
      max-width: 200px;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '📰 熊哥每日资讯',
      repo: 'https://github.com/xinde/daily-digest',
      homepage: 'posts/2026-05-04.md',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      formatUpdated: '{YYYY}/{MM}/{DD}',
      alias: {
        '/posts/': 'posts/README.md'
      },
      search: {
        paths: 'auto',
        placeholder: '🔍 搜索',
        noData: '没有结果',
        depth: 3
      },
      pagination: {
        previousText: '前一天',
        nextText: '后一天',
        crossChapter: true
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/shell-session.min.js"></script>
</body>
</html>
